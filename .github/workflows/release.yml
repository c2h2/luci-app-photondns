name: build-packages

# Cross-compiles the photondns Rust daemon for a spread of OpenWrt
# architectures, assembles .ipk (opkg, <=24.10) and .apk (apk-tools, >=25.12)
# packages for the daemon plus the two architecture-independent LuCI apps,
# verifies the packages actually install in real OpenWrt rootfses (opkg on
# 23.05/24.10, apk on 25.12), and attaches everything to a GitHub Release on
# tag push.
#
# Also ships each daemon build as a standalone static binary
# (photondns-<ver>-<arch>-linux-musl) — no OpenWrt needed, runs on any
# Linux distro (see run_standalone.sh / plain systemd deployments).

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release from the artifacts'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------- daemon
  build:
    name: build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: aarch64,  triple: aarch64-unknown-linux-musl,      owrt: aarch64_generic,           tier: 2 }
          - { arch: x86_64,   triple: x86_64-unknown-linux-musl,       owrt: x86_64,                    tier: 2 }
          - { arch: armv7,    triple: armv7-unknown-linux-musleabihf,  owrt: arm_cortex-a7_neon-vfpv4,  tier: 2 }
          - { arch: riscv64,  triple: riscv64gc-unknown-linux-musl,    owrt: riscv64_riscv64,           tier: 2 }
    # NB: 32-bit mips/mipsel are intentionally excluded — the daemon uses
    # AtomicU64, which those targets lack (no native 64-bit atomics), so they
    # cannot build without code changes. Add them back only after the atomics
    # are made portable.
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.triple }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Cross-compile daemon
        run: |
          cargo zigbuild --release --bin photondns --target ${{ matrix.triple }}
          file target/${{ matrix.triple }}/release/photondns

      - name: Install apk-tools 3.x (for .apk output)
        run: |
          # OpenWrt 25.12+ uses apk-tools 3.x (24.10 and earlier still use
          # opkg); grab the Alpine static build, which ships `apk mkpkg`. An
          # Alpine v2 .apk is just a gzip tarball, so we can unpack the static
          # binary without needing apk itself.
          url="https://dl-cdn.alpinelinux.org/alpine/edge/main/x86_64/apk-tools-static-3.0.6-r0.apk"
          curl -fsSL "$url" -o /tmp/apk-static.apk
          tar xzf /tmp/apk-static.apk -C /tmp sbin/apk.static
          sudo install -m 0755 /tmp/sbin/apk.static /usr/local/bin/apk
          apk --version

      - name: Assemble packages
        run: |
          export EMIT_APK=1
          command -v apk >/dev/null 2>&1 || export EMIT_APK=0
          # Only emit the arch-independent LuCI apps once (on aarch64).
          [ "${{ matrix.arch }}" = "aarch64" ] || export SKIP_LUCI=1
          bash packaging/build-packages.sh \
            ${{ matrix.triple }} \
            target/${{ matrix.triple }}/release/photondns \
            dist

      - name: Standalone static binary
        run: |
          ver="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          install -m 0755 target/${{ matrix.triple }}/release/photondns \
            "dist/photondns-${ver}-${{ matrix.arch }}-linux-musl"

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # -------------------------------------------------- install-verification
  verify:
    name: verify ${{ matrix.pm }} installs (OpenWrt ${{ matrix.tag }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64, tag: '23.05.6', pm: opkg }  # last opkg/.ipk LTS
          - { arch: x86_64, tag: '24.10.7', pm: opkg }  # 24.10 still uses opkg
          - { arch: x86_64, tag: '25.12.4', pm: apk }   # first apk/.apk release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages-${{ matrix.arch }}
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: packages-aarch64   # the LuCI (arch: all) packages live here
          path: luci
      - name: opkg install inside an OpenWrt rootfs
        if: matrix.pm == 'opkg'
        run: |
          set -e
          cp luci/luci-app-photondns_*_all.ipk dist/ 2>/dev/null || true
          docker run --rm -v "$PWD/dist:/pkgs" openwrt/rootfs:${{ matrix.arch }}-${{ matrix.tag }} sh -c '
            set -e
            mkdir -p /var/lock
            opkg install --force-depends /pkgs/photondns_*_'"${{ matrix.arch }}"'*.ipk
            echo "--- installed files ---"
            opkg files photondns
            test -x /usr/bin/photondns && echo "binary present + executable: OK"
            # config-only validate (no upstreams reachable in CI, just parse)
            printf "[server]\nlisten=[\"127.0.0.1:15533\"]\n[[group]]\nname=\"main\"\nupstreams=[\"udp://127.0.0.1:1\"]\n" > /tmp/t.toml
            /usr/bin/photondns -t -c /tmp/t.toml && echo "config validate: OK"

            # LuCI app (arch: all): opkg wont resolve curl/rpcd offline and is
            # fussy about arch:all in a feed-less rootfs, so verify by unpacking
            # the package the same way opkg does and checking its payload lands.
            mkdir -p /tmp/luci && cd /tmp/luci
            tar xzf /pkgs/luci-app-photondns_*_all.ipk
            tar xzf ./data.tar.gz
            test -f ./usr/share/rpcd/ucode/luci.photondns && echo "ucode backend present: OK"
            test -f ./www/luci-static/resources/view/photondns/status.js && echo "luci views present: OK"
            test -f ./etc/init.d/photondns && echo "init script present: OK"
            # control metadata sane?
            tar xzf ./control.tar.gz ./control && grep -q "^Package: luci-app-photondns$" ./control && echo "control ok: OK"
            echo "VERIFY OK"
          '

      - name: apk install inside an OpenWrt rootfs
        if: matrix.pm == 'apk'
        run: |
          set -e
          cp luci/luci-app-photondns_*_all.apk dist/ 2>/dev/null || true
          docker run --rm -v "$PWD/dist:/pkgs" openwrt/rootfs:${{ matrix.arch }}-${{ matrix.tag }} sh -c '
            set -e
            # The daemon package has no dependencies, so install it for real
            # from the local file, offline (no feeds needed). Our packages are
            # unsigned, hence --allow-untrusted.
            apk add --allow-untrusted --repositories-file /dev/null \
              /pkgs/photondns_*_'"${{ matrix.arch }}"'.apk
            echo "--- installed ---"
            apk list --installed 2>/dev/null | grep photondns || true
            test -x /usr/bin/photondns && echo "binary present + executable: OK"
            # config-only validate (no upstreams reachable in CI, just parse)
            printf "[server]\nlisten=[\"127.0.0.1:15533\"]\n[[group]]\nname=\"main\"\nupstreams=[\"udp://127.0.0.1:1\"]\n" > /tmp/t.toml
            /usr/bin/photondns -t -c /tmp/t.toml && echo "config validate: OK"

            # LuCI app (arch: all): its deps (curl/rpcd/rpcd-mod-ucode) are not
            # resolvable offline, so verify by extracting the payload with apk
            # itself (APKv3 is not a plain tarball) and checking it lands.
            # NB: apk extract errors out if the destination does not exist.
            mkdir -p /tmp/luci
            apk extract --allow-untrusted --destination /tmp/luci \
              /pkgs/luci-app-photondns_*_all.apk
            echo "--- extracted files ---"
            find /tmp/luci -type f | sort
            find /tmp/luci -path "*/usr/share/rpcd/ucode/luci.photondns" | grep -q . && echo "ucode backend present: OK"
            find /tmp/luci -path "*/www/luci-static/resources/view/photondns/status.js" | grep -q . && echo "luci views present: OK"
            find /tmp/luci -path "*/etc/init.d/photondns" | grep -q . && echo "init script present: OK"
            echo "VERIFY OK"
          '

  # ------------------------------------------------------------- release
  release:
    name: publish release
    needs: [build, verify]
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: dist
          merge-multiple: true
      - name: Show what will be released
        run: ls -la dist/
      - name: Generate checksums
        run: (cd dist && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
